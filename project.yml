name: Dayco
options:
  bundleIdPrefix: com.seunghwabaek
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: ko
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
targets:
  Dayco:
    type: application
    platform: iOS
    sources:
      - path: Dayco
    resources:
      - path: Dayco/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seunghwabaek.dayco
        INFOPLIST_FILE: Dayco/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Dayco/Dayco.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: DaycoWidget
        embed: true
    scheme:
      testTargets:
        - DaycoTests
  DaycoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DaycoWidget
      - path: Dayco/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seunghwabaek.dayco.widget
        INFOPLIST_FILE: DaycoWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: DaycoWidget/DaycoWidget.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
  DaycoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DaycoTests
    dependencies:
      - target: Dayco
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seunghwabaek.dayco.tests
        GENERATE_INFOPLIST_FILE: YES
